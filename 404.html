<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada | Rafa Tocino</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"></noscript>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (!t) { t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"; }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
</head>
<body data-page-title="Error 404">
  <main class="container page" id="contenido">
    <h2 class="section-title">Página no encontrada</h2>
    <div class="placeholder">
      <p class="emoji" aria-hidden="true">🔍</p>
      <p>La página que buscas no existe o se ha movido.</p>
      <p><a href="/">Volver al inicio</a></p>
    </div>
  </main>
  <script src="/js/layout.js"></script>
</body>
</html>
